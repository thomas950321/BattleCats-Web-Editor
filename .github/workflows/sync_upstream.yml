name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升級到 v4 解決 Node.js 警告
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'actions@github.com'
          
          echo ">>> Adding upstream remote..."
          git remote add upstream https://github.com/fieryhenry/BCSFE-Python.git
          
          echo ">>> Fetching from upstream..."
          git fetch upstream
          
          echo ">>> List of branches for debugging:"
          git branch -a
          
          echo ">>> Switching to main branch..."
          git checkout main
          
          echo ">>> Attempting to merge upstream/main..."
          # 使用 -X theirs 在發生衝突時，優先保留作者的代碼 (針對核心功能更新)
          # 但你的 bcsfe_web 資料夾因為作者沒有，所以不會被覆蓋，非常安全。
          git merge upstream/main -m "chore: sync with upstream (fieryhenry)" --allow-unrelated-histories
          
          echo ">>> Pushing changes to origin..."
          git push origin main
