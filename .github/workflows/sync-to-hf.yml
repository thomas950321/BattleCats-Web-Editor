name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install -U huggingface_hub

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 使用 API 模式直接上傳，徹底繞過 Git 對二進位檔 (adb.exe) 的限制
          python -m huggingface_hub.commands.huggingface_cli upload \
            thomas950321/battlecats-editor \
            . \
            . \
            --repo-type=space \
            --token $HF_TOKEN \
            --commit-message "Sync from GitHub via API (Bypassing Git limits)"
