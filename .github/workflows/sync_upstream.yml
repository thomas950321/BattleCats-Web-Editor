name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 0 點自動執行 (UTC)
  workflow_dispatch:      # 允許你在 GitHub Actions 頁面手動點擊執行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'actions@github.com'
          
          # 新增上游倉庫
          git remote add upstream https://github.com/fieryhenry/BCSFE-Python.git
          git fetch upstream
          
          # 切換到你的主分支
          git checkout main
          
          # 合併作者的 main 分支 (該專案使用的是 main)
          # 使用 --no-edit 自動完成 commit 訊息，--allow-unrelated-histories 以防萬一
          git merge upstream/main -m "chore: sync with upstream (fieryhenry)" --allow-unrelated-histories
          
          # 推送到你自己的倉庫
          git push origin main
