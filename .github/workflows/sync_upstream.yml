name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write # 賦予寫入權限，解決 403 錯誤

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升級到 v4 解決 Node.js 警告
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'actions@github.com'
          
          # 加入原作者遠端
          git remote add upstream https://github.com/fieryhenry/BCSFE-Python.git
          git fetch upstream main
          
          # 檢查是否有來自原作者的更新
          UPSTREAM_CHANGES=$(git rev-list HEAD..upstream/main --count)
          
          if [ "$UPSTREAM_CHANGES" -eq "0" ]; then
            echo ">>> No new changes from upstream. Skipping sync."
            exit 0
          fi
          
          echo ">>> Found $UPSTREAM_CHANGES new commits from upstream. Proceeding to merge..."
          
          # 備份目前的 README.md
          cp README.md README.md.bak
          
          # 執行合併 (使用 -X theirs 確保代碼邏輯更新)
          git merge upstream/main -m "chore: sync with upstream (fieryhenry)" --allow-unrelated-histories -X theirs
          
          # 還原你的自訂 README.md
          mv README.md.bak README.md
          git add README.md
          
          # 只有在 README.md 真的被改動時才建立第二筆提交紀錄
          git commit -m "chore: restore custom README.md after sync" || echo "README.md already matched"
          
          echo ">>> Pushing changes to origin..."
          git push origin main
