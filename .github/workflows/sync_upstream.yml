name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write # 賦予寫入權限，解決 403 錯誤

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升級到 v4 解決 Node.js 警告
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'actions@github.com'
          
          echo ">>> Adding upstream remote..."
          git remote add upstream https://github.com/fieryhenry/BCSFE-Python.git
          
          echo ">>> Fetching from upstream..."
          git fetch upstream
          
          echo ">>> List of branches for debugging:"
          git branch -a
          
          echo ">>> Switching to main branch..."
          git checkout main
          
          echo ">>> Attempting to merge upstream/main..."
          # 先記住合併前的狀態
          PRE_MERGE_SHA=$(git rev-parse HEAD)
          
          # 執行合併
          git merge upstream/main -m "chore: sync with upstream (fieryhenry)" --allow-unrelated-histories -X theirs
          
          echo ">>> Restoring original README.md..."
          # 從合併前的 SHA 中單獨抓回 README.md
          git checkout $PRE_MERGE_SHA -- README.md
          
          # 提交還原後的 README.md (如果沒變動會自動跳過)
          git add README.md
          git commit --amend --no-edit || echo "No changes to README.md to restore"
          
          echo ">>> Pushing changes to origin..."
          git push origin main
