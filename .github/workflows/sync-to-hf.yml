name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        # 使用 Hugging Face 官方提供的同步工具
        uses: huggingface/github-sync-action@v2
        with:
          github_repo_id: thomas950321/BattleCats-Web-Editor
          huggingface_repo_id: thomas950321/battlecats-editor
          repo_type: space
          sync_branch: main
          hf_token: ${{ secrets.HF_TOKEN }}
